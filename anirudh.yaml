apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-2048-anirudh
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2048-anirudh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2048-anirudh
    spec:
      containers:
        - name: course
          image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/anirudh-repo
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"

---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-2048-anirudh
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app-2048-anirudh
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-2048-anirudh
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-port: "3001"
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-2048-anirudh
                port:
                  number: 3001